# Main configuration — composed from sub-configs via Hydra
defaults:
  - data: nuscenes
  - detector: grounding_dino
  - segmentor: sam2
  - lifter: depth_anything
  - _self_

# Pipeline settings
pipeline:
  name: "autolabel3d"
  output_dir: "outputs/${now:%Y-%m-%d_%H-%M-%S}"
  seed: 42
  device: "auto"  # auto | cpu | mps | cuda

# Logging
logging:
  level: "INFO"
  wandb:
    enabled: false
    project: "autolabel3d"
    entity: null
